spring:
  application:
    name: payment-gateway

  ## -----------  Database  ------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payment_gateway}
    username: ${DB_USERNAME:payment_user}
    password: ${DB_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PaymentGatewayPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        jdbc:
          batch_size: 50
          time_zone: UTC

  ## ---------- KAFKA -----------------
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-gateway
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "payment.gateway.saga.events"
        session.timeout.ms: 30000
        heartbeat.interval.ms: 3000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

  ## --------------  REDIS  ---------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  ## -------------  JACKSON  ----------------
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  ## ------------  RESILIENCE4J  --------------
  resilience4j:
    circuitbreaker:
      instances:
        payment-service:
          register-health-indicator: true
          sliding-window-type: COUNT_BASED
          sliding-window-size: 20
          minimum-number-of-calls: 10
          permitted-number-of-calls-in-half-open-state: 5
          wait-duration-in-open-state: 60s
          failure-rate-threshold: 50
          slow-call-rate-threshold: 80
          slow-call-duration-threshold: 2s
        database:
          register-health-indicator: true
          sliding-window-size: 10
          failure-rate-threshold: 40
          wait-duration-in-open-state: 30s

    retry:
      instances:
        account-update:
          max-attempts: 5
          wait-duration: 100ms
          enable-exponential-backoff: true
          exponential-backoff-multiplier: 2
          retry-exceptions:
            - org.springframework.dao.OptimisticLockingFailureException
            - org.springframework.dao.CannotAcquireLockException
        kafka-publish:
          max-attempts: 3
          wait-duration: 1s
          retry-exceptions:
            - org.apache.kafka.common.errors.NetworkException

    ratelimiter:
      instances:
        payment-api:
          register-health-indicator: true
          limit-for-period: 1000
          limit-refresh-period: 1s
          timeout-duration: 500ms
        per-account:
          limit-for-period: 10
          limit-refresh-period: 1s
          timeout-duration: 100ms

    timelimiter:
      instances:
        payment-service:
          timeout-duration: 5s

## ------------- Observability ----------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retries,ratelimiters
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        readiness:
          include: db,kafka,redis,circuitBreakers
        liveness:
          include: ping
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENV:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        payment.initiation.duration: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99,0.999
      slo:
        http.server.requests: 50ms,100ms,200ms,500ms,1s,2s
  tracing:
    sampling:
      probability: ${TRACE_SAMPLING:1.0}   # 100% in dev, lower in prod
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

## ----------  SERVER --------------
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    accept-count: 100
    connection-timeout: 20000
    max-connections: 10000

## ------ Logging (structured JSON via Logback) ------
logging:
  level:
    com.payment.gateway: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
    io.github.resilience4j: INFO
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  config: classpath:logback-spring.xml


